name: deploy

# Push to main → run the full test + typecheck gate, then deploy to Cloudflare.
# A red build never reaches lifescored.com.
on:
  push:
    branches: [main]
    # Infra changes (Cloudflare clicky-layer) are handled by infra.yml (OpenTofu); a tofu-only
    # change shouldn't trigger a code rebuild + redeploy of the worker.
    paths-ignore: ['infra/**']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: test + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Cache the browser binaries so the install is fast (and far less likely to wedge on a
      # stuck apt mirror — a hung install once ate an hour before timeouts were added).
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright (browsers + system deps)
        timeout-minutes: 6
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  deploy:
    name: build + deploy
    needs: [test, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # No `command:` → wrangler-action runs `wrangler deploy`, reading wrangler.jsonc.
          # GEMINI_API_KEY is a Worker secret set once via `wrangler secret put` and
          # persists across deploys — it is NOT passed here.
