name: Publish to MCP Registry

# The MCP registry listing is just static metadata (server.json) for the remote server at
# https://lifescored.com/mcp. Re-publish when that file changes (and bump its `version`).
# Domain ownership is proven by /.well-known/mcp-registry-auth, already served by the app — so
# this only needs the Ed25519 signing key, kept as the MCP_PRIVATE_KEY repo secret.
on:
  push:
    branches: [main]
    paths: ['server.json']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Skip if this version is already published
        id: guard
        run: |
          LOCAL=$(jq -r .version server.json)
          PUBLISHED=$(curl -s "https://registry.modelcontextprotocol.io/v0/servers?search=lifescored" \
            | jq -r --arg v "$LOCAL" '[.servers[] | select(.server.name=="com.lifescored/mcp" and .server.version==$v)] | length')
          if [ "$PUBLISHED" != "0" ]; then
            echo "com.lifescored/mcp version $LOCAL is already published — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to MCP Registry
        if: steps.guard.outputs.skip == 'false'
        run: ./mcp-publisher login http --domain lifescored.com --private-key "${{ secrets.MCP_PRIVATE_KEY }}"

      - name: Validate and publish
        if: steps.guard.outputs.skip == 'false'
        run: |
          ./mcp-publisher validate
          ./mcp-publisher publish
