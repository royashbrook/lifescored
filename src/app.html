<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			/* A #p= share fragment carries the user's exact answers (income, assets, debt…). Strip it
			   from the URL synchronously here — before SvelteKit hydrates and before the browser's own
			   native share (Safari's share button, the "⋯" menu) can read location.href — so the answers
			   can never leak through a re-share. The payload is stashed for the app to import. */
			(function () {
				try {
					if (location.hash.indexOf('#p=') === 0) {
						window.__lsShared = location.hash.slice(3);
						history.replaceState(null, '', location.pathname + location.search);
					}
				} catch (e) {
					/* no-op: app falls back to reading location.hash */
				}
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="description" content="You are already a number. life. scored. rebuilds the world's scoring systems in the open — every rule cited, every weight editable." />
		<meta property="og:site_name" content="life. scored." />
		<meta property="og:title" content="life. scored." />
		<meta property="og:description" content="You are already a number. Every rule cited, every weight editable." />
		<meta property="og:image" content="https://lifescored.com/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="life. scored. — you are already a number." />
		<meta property="og:url" content="https://lifescored.com" />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="life. scored." />
		<meta name="twitter:description" content="You are already a number. Every rule cited, every weight editable." />
		<meta name="twitter:image" content="https://lifescored.com/og.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="alternate" type="text/plain" title="llms.txt" href="/llms.txt" />
		<link rel="alternate" type="text/plain" title="llms-full.txt" href="/llms-full.txt" />
		<link rel="alternate" type="application/json" title="rules.json" href="/rules.json" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
